<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇迹小周</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --primary-shadow: 0 8px 0 #b2bec3;
            --border-radius: 20px;
            --border-style: 4px solid #2c3e50;
        }

        * {
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* 游戏HUD面板样式 */
        .hud-card {
            background: var(--card-bg);
            border: var(--border-style);
            border-radius: var(--border-radius);
            box-shadow: var(--primary-shadow);
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* 考试倒计时专属样式 */
        .countdown-banner {
            background: #ffeaa7;
            border: var(--border-style);
            border-radius: var(--border-radius);
            box-shadow: var(--primary-shadow);
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
        }
        .countdown-days {
            color: #d63031;
            font-size: 1.8rem;
            margin: 0 5px;
        }

        /* 等级与经验条 */
        .lvl-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .lvl-badge {
            background: #ff7675;
            color: white;
            padding: 5px 12px;
            border-radius: 10px;
            font-weight: bold;
            border: 2px solid #2c3e50;
        }
        .xp-bar-bg {
            flex-grow: 1;
            height: 20px;
            background: #dfe6e9;
            border: 2px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
        }
        .xp-bar-fill {
            height: 100%;
            background: #74b9ff;
            width: 0%;
            transition: width 0.4s ease;
        }

        /* 怪物血条 */
        .boss-container {
            background: #ffeaa7;
            border: 2px solid #2c3e50;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        .hp-bar-bg {
            height: 25px;
            background: #dfe6e9;
            border: 2px solid #2c3e50;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 5px;
            position: relative;
        }
        .hp-bar-fill {
            height: 100%;
            background: #ff7675;
            width: 100%;
            transition: width 0.4s ease;
        }
        .hp-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-weight: bold;
            line-height: 21px;
            color: #2c3e50;
        }

        /* 收集元素收集面板 */
        .attr-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .attr-item {
            background: #f1f2f6;
            border: 2px solid #2c3e50;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* 任务菜单标签 */
        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab-button {
            flex: 1;
            padding: 10px;
            border: 3px solid #2c3e50;
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #2c3e50;
            transform: translateY(0);
            transition: all 0.1s;
        }
        .tab-button.active {
            background: #fdcb6e;
            transform: translateY(4px);
            box-shadow: none;
        }

        /* 任务输入区域 */
        .input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        input[type="text"], input[type="number"] {
            padding: 12px;
            border: 3px solid #2c3e50;
            border-radius: 12px;
            font-size: 1rem;
        }
        input[type="text"] { flex-grow: 1; }
        input[type="number"] { width: 100px; }
        
        .type-select-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .type-btn {
            padding: 6px 12px;
            border: 2px solid #2c3e50;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .type-btn.selected {
            background: #a29bfe;
            color: white;
        }

        .add-btn {
            padding: 12px 20px;
            background: #00b894;
            color: white;
            border: 3px solid #2c3e50;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #2c3e50;
        }
        .add-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* 任务列表元素 */
        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .task-item {
            background: white;
            border: 3px solid #2c3e50;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 0 #2c3e50;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 3px solid #2c3e50;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: white;
        }
        .task-text {
            font-size: 1.05rem;
            font-weight: bold;
        }
        .task-tag {
            font-size: 0.8rem;
            padding: 2px 6px;
            border: 1px solid #2c3e50;
            border-radius: 4px;
            margin-left: 5px;
            background: #dfe6e9;
        }

        /* 高压训练面板 */
        .timer-card {
            background: #fab1a0;
            border: var(--border-style);
            border-radius: var(--border-radius);
            box-shadow: var(--primary-shadow);
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .timer-display {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
            font-family: monospace;
        }
        .timer-inputs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .timer-btn {
            padding: 8px 16px;
            background: #d63031;
            color: white;
            border: 2px solid #2c3e50;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 胜利全屏弹窗 */
        .celebrate-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .celebrate-box {
            background: white;
            border: var(--border-style);
            border-radius: var(--border-radius);
            padding: 40px;
            text-align: center;
            box-shadow: 0 12px 0 #636e72;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 80%;
        }
        .celebrate-box h1 {
            color: #e17055;
            font-size: 2.5rem;
            margin-top: 0;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .fade-out {
            transform: scale(0.8) translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="countdown-banner">
            距离 🎯 目标公考试炼 还有 <span id="countdown-days" class="countdown-days">--</span> 天
        </div>

        <div class="hud-card">
            <div class="hud-header">
                <span id="hud-date">⏳ 加载时间...</span>
                <span id="hud-countdown">⏰ 倒计时...</span>
            </div>
            
            <div class="lvl-container">
                <div class="lvl-badge" id="player-level">LV.1</div>
                <div class="xp-bar-bg">
                    <div class="xp-bar-fill" id="player-xp-fill"></div>
                </div>
            </div>

            <div class="boss-container">
                <div style="font-weight: bold; font-size: 0.95rem;">👹 当期怠惰巨兽残存血量</div>
                <div class="hp-bar-bg">
                    <div class="hp-bar-fill" id="boss-hp-fill"></div>
                    <div class="hp-text" id="boss-hp-text">0 / 0 HP</div>
                </div>
            </div>

            <div class="attr-grid">
                <div class="attr-item">🍀 常识: <span id="attr-cs">0</span></div>
                <div class="attr-item">🔮 判断: <span id="attr-pd">0</span></div>
                <div class="attr-item">⚡ 数量: <span id="attr-sl">0</span></div>
                <div class="attr-item">📜 言语: <span id="attr-yy">0</span></div>
                <div class="attr-item">💎 资料: <span id="attr-zl">0</span></div>
            </div>
        </div>

        <div class="tab-menu">
            <button class="tab-button active" onclick="switchTab('daily')">每日副本</button>
            <button class="tab-button" onclick="switchTab('weekly')">每周挑战</button>
            <button class="tab-button" onclick="switchTab('monthly')">月度战役</button>
        </div>

        <div class="input-area" id="input-area-box">
            <div class="input-row">
                <input type="text" id="task-input" placeholder="召唤新的自律任务...">
                <button class="add-btn" onclick="addTask()">部署任务</button>
            </div>
            <div class="type-select-row">
                <button class="type-btn selected" onclick="selectType(this, '常规')">🛡️ 常规</button>
                <button class="type-btn" onclick="selectType(this, '常识')">🍀 常识</button>
                <button class="type-btn" onclick="selectType(this, '判断')">🔮 判断</button>
                <button class="type-btn" onclick="selectType(this, '数量')">⚡ 数量</button>
                <button class="type-btn" onclick="selectType(this, '言语')">📜 言语</button>
                <button class="type-btn" onclick="selectType(this, '资料')">💎 资料</button>
            </div>
        </div>

        <ul class="task-list" id="task-list-view"></ul>

        <div class="timer-card">
            <div style="font-weight: bold; font-size: 1.1rem; margin-bottom: 5px;">⏳ 模块全真高压训练</div>
            <div class="timer-inputs" id="timer-inputs-area">
                <input type="number" id="custom-minutes" value="30" min="1" max="999" style="width: 80px; text-align: center;"> 分钟
                <button class="timer-btn" style="background:#00b894;" onclick="startCustomTimer()">开启训练</button>
            </div>
            <div class="timer-display" id="timer-clock">00:00</div>
            <button class="timer-btn" id="timer-control-btn" onclick="stopTimer()" style="display:none;">强行中止</button>
        </div>

    </div>

    <div class="celebrate-overlay" id="celebrate-modal">
        <div class="celebrate-box">
            <h1 id="celebrate-title">VICTORY!</h1>
            <p id="celebrate-desc">当前阶段的怠惰怪兽已被你彻底斩杀！经验暴涨！</p>
            <button class="add-btn" onclick="closeCelebrate()">收兵回营</button>
        </div>
    </div>

    <script>
        // --- 🎯 目标考试日期设置（可自行修改目标时间） ---
        const TARGET_EXAM_DATE = "2026-11-28"; 

        // 默认全局状态库
        const defaultState = {
            level: 1,
            xp: 0,
            attrs: { cs: 0, pd: 0, sl: 0, yy: 0, zl: 0 },
            daily: [],
            weekly: [],
            monthly: [],
            lastDailyRefresh: "" // 用于判断每日刷新
        };

        let gameState = {};
        let currentTab = 'daily';
        let selectedType = '常规';
        let timerInterval = null;

        // 🛡️ 数据热更新与加载保安函数
        function loadAndMigrateData() {
            const parsed = JSON.parse(localStorage.getItem('epic_todo_rpg_state'));
            if (!parsed) {
                gameState = { ...defaultState };
            } else {
                // 平滑合并新老数据字段，防止删档
                gameState = { ...defaultState, ...parsed };
                if (!gameState.attrs) gameState.attrs = { ...defaultState.attrs };
            }
            
            // 🕒 每日核心任务自动生成与跨天重置逻辑
            checkDailyRefresh();
            
            saveData();
        }

        function saveData() {
            localStorage.setItem('epic_todo_rpg_state', JSON.stringify(gameState));
        }

        // 🍀 每天凌晨自动生成固定副本
        function checkDailyRefresh() {
            const todayStr = new Date().toLocaleDateString();
            if (gameState.lastDailyRefresh !== todayStr) {
                // 清空旧的每日任务，并注入雷打不动的公考铁人三项
                gameState.daily = [
                    { id: 'd-zl', text: '资料分析一章 💎', type: '资料', done: false, isFixed: true },
                    { id: 'd-yy', text: '言语理解一章 📜', type: '言语', done: false, isFixed: true },
                    { id: 'd-pd', text: '判断推理一章 🔮', type: '判断', done: false, isFixed: true }
                ];
                gameState.lastDailyRefresh = todayStr;
            }
        }

        // 界面数据渲染引擎
        function renderUI() {
            // 渲染等级与经验
            document.getElementById('player-level').innerText = `LV.${gameState.level}`;
            document.getElementById('player-xp-fill').style.width = `${gameState.xp}%`;

            // 渲染神装属性元素
            document.getElementById('attr-cs').innerText = gameState.attrs.cs || 0;
            document.getElementById('attr-pd').innerText = gameState.attrs.pd || 0;
            document.getElementById('attr-sl').innerText = gameState.attrs.sl || 0;
            document.getElementById('attr-yy').innerText = gameState.attrs.yy || 0;
            document.getElementById('attr-zl').innerText = gameState.attrs.zl || 0;

            // 渲染任务列表与怪物血条
            const listContainer = document.getElementById('task-list-view');
            listContainer.innerHTML = '';
            
            const activeList = gameState[currentTab] || [];
            const uncompletedCount = activeList.filter(t => !t.done).length;
            const totalCount = activeList.length;

            // 折算Boss血量
            let maxHp = totalCount * 100;
            let currentHp = uncompletedCount * 100;
            if(maxHp === 0) { maxHp = 100; currentHp = 0; }
            
            const hpPercent = (currentHp / maxHp) * 100;
            document.getElementById('boss-hp-fill').style.width = `${hpPercent}%`;
            document.getElementById('boss-hp-text').innerText = `${currentHp} / ${maxHp} HP`;

            // 控制自定义输入框展示
            if (currentTab === 'daily') {
                document.getElementById('input-area-box').style.display = 'flex';
            } else {
                document.getElementById('input-area-box').style.display = 'flex'; 
            }

            // 循环绘制任务Item
            activeList.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';
                if(task.done) li.style.opacity = '0.5';

                let tagIcon = '🛡️';
                if(task.type === '常识') tagIcon = '🍀';
                if(task.type === '判断') tagIcon = '🔮';
                if(task.type === '数量') tagIcon = '⚡';
                if(task.type === '言语') tagIcon = '📜';
                if(task.type === '资料') tagIcon = '💎';

                li.innerHTML = `
                    <div class="task-left">
                        <div class="task-checkbox" onclick="completeTask('${task.id}')">${task.done ? '✓' : ''}</div>
                        <span class="task-text">${task.text} <span class="task-tag">${tagIcon} ${task.type}</span></span>
                    </div>
                `;
                listContainer.appendChild(li);
            });
        }

        // 标签切换
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderUI();
        }

        // 选择属性分类
        function selectType(btn, type) {
            selectedType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        // 新增部署新任务
        function addTask() {
            const input = document.getElementById('task-input');
            if(!input.value.trim()) return;

            const newTask = {
                id: 't-' + Date.now(),
                text: input.value.trim(),
                type: selectedType,
                done: false,
                isFixed: false
            };

            gameState[currentTab].push(newTask);
            input.value = '';
            saveData();
            renderUI();
        }

        // 消灭斩杀任务逻辑
        function completeTask(id) {
            const activeList = gameState[currentTab];
            const taskIndex = activeList.findIndex(t => t.id === id);
            if(taskIndex === -1 || activeList[taskIndex].done) return;

            const task = activeList[taskIndex];
            task.done = true;

            // 核心游戏数值结算
            // 1. 属性升级点数加成
            if(task.type === '常识') gameState.attrs.cs = (gameState.attrs.cs || 0) + 1;
            if(task.type === '判断') gameState.attrs.pd = (gameState.attrs.pd || 0) + 1;
            if(task.type === '数量') gameState.attrs.sl = (gameState.attrs.sl || 0) + 1;
            if(task.type === '言语') gameState.attrs.yy = (gameState.attrs.yy || 0) + 1;
            if(task.type === '资料') gameState.attrs.zl = (gameState.attrs.zl || 0) + 1;

            // 2. 经验结算与爆级逻辑
            gameState.xp += 35; 
            if(gameState.xp >= 100) {
                gameState.level += 1;
                gameState.xp = gameState.xp - 100;
                setTimeout(() => { alert(`🎉 恭喜突破！系统评定你已晋升到 LV.${gameState.level} 阶段！`); }, 300);
            }

            saveData();
            renderUI();

            // 3. 判断是否清空全盘触发副本通关庆祝
            const incompleteCount = activeList.filter(t => !t.done).length;
            if(incompleteCount === 0) {
                setTimeout(() => { triggerCelebrate(); }, 500);
            }
        }

        // 全清关卡大庆祝
        function triggerCelebrate() {
            const modal = document.getElementById('celebrate-modal');
            const title = document.getElementById('celebrate-title');
            const desc = document.getElementById('celebrate-desc');

            if(currentTab === 'daily') {
                title.innerText = "⚔️ 每日副本全清！";
                desc.innerText = "今天的核心试炼巨兽已被全数歼灭！你距离成“公”上岸又近了一步！";
            } else if(currentTab === 'weekly') {
                title.innerText = "🏆 精英挑战破城！";
                desc.innerText = "本周的宏观硬骨头已被你一口口啃下！耐力值大突破！";
            } else {
                title.innerText = "👑 战役大获全胜！";
                desc.innerText = "本月的战役大捷！你用无懈可击的铁血自律完成了降维打击！";
            }

            modal.style.display = 'flex';
        }

        function closeCelebrate() {
            // 清理掉非固定的已完成任务，保留第二天的日常固定模组
            gameState[currentTab] = gameState[currentTab].filter(t => !t.done);
            document.getElementById('celebrate-modal').style.display = 'none';
            saveData();
            renderUI();
        }

        // ⏱️ 自定义高压沙漏核心控制逻辑
        function startCustomTimer() {
            clearInterval(timerInterval);
            const minutesInput = document.getElementById('custom-minutes').value;
            let timeLeft = parseInt(minutesInput, 10) * 60;
            
            if (isNaN(timeLeft) || timeLeft <= 0) {
                alert("请输入合理的训练分钟数！");
                return;
            }

            document.getElementById('timer-inputs-area').style.display = 'none';
            document.getElementById('timer-control-btn').style.display = 'inline-block';

            function updateClock() {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timer-clock').innerText = 
                    `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer-clock').innerText = "训练终了！";
                    document.getElementById('timer-inputs-area').style.display = 'flex';
                    document.getElementById('timer-control-btn').style.display = 'none';
                    alert("⚔️ 高压演练副本时限到！收刀！请立刻核对解析并复盘错题！");
                }
                timeLeft--;
            }
            updateClock();
            timerInterval = setInterval(updateClock, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer-clock').innerText = "00:00";
            document.getElementById('timer-inputs-area').style.display = 'flex';
            document.getElementById('timer-control-btn').style.display = 'none';
        }

        // 🕒 系统时空HUD抬头显示更新
        function updateSystemHUD() {
            const now = new Date();
            // 日期及星期
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'long' };
            document.getElementById('hud-date').innerText = now.toLocaleDateString('zh-CN', options);
            
            // 距离今天结束倒计时
            const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getOrdinaryDate ? now.getOrdinaryDate()+1 : now.getDate()+1, 0, 0, 0);
            const diffMs = endOfDay - now;
            const hoursLeft = Math.floor(diffMs / (1000 * 60 * 60));
            const minsLeft = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('hud-countdown').innerText = `距今日结算: ${hoursLeft}h ${minsLeft}m`;

            // 🎯 大目标试炼考公倒计时
            const examDate = new Date(TARGET_EXAM_DATE);
            const timeDiff = examDate - now;
            const daysDiff = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
            document.getElementById('countdown-days').innerText = daysDiff > 0 ? daysDiff : 0;
        }

        // 初始化启动阵法
        loadAndMigrateData();
        renderUI();
        updateSystemHUD();
        setInterval(updateSystemHUD, 60000); // 每分钟校准一次系统HUD
    </script>
</body>
</html>
