<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇迹小周</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --primary-shadow: 0 8px 0 #b2bec3;
            --border-radius: 20px;
            --border-style: 4px solid #2c3e50;
        }

        * { box-sizing: border-box; font-family: 'Arial', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 600px; }

        .hud-card {
            background: var(--card-bg);
            border: var(--border-style);
            border-radius: var(--border-radius);
            box-shadow: var(--primary-shadow);
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* 🎯 可编辑倒计时板块样式 */
        .countdown-banner {
            background: #ffeaa7;
            border: var(--border-style);
            border-radius: var(--border-radius);
            box-shadow: var(--primary-shadow);
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .countdown-title {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        .countdown-days { color: #d63031; font-size: 2rem; margin: 0 5px; font-weight: bold; }
        
        .edit-zone {
            margin-top: 10px;
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        .edit-zone input {
            padding: 4px 8px;
            border: 2px solid #2c3e50;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        /* 🔥 Combo连击显示 */
        .combo-badge {
            background: #e17055;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 2px solid #2c3e50;
            animation: bounce 0.3s infinite alternate;
            display: none;
        }

        /* 等级与经验条 */
        .lvl-container { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .lvl-badge { background: #ff7675; color: white; padding: 5px 12px; border-radius: 10px; font-weight: bold; border: 2px solid #2c3e50; }
        .xp-bar-bg { flex-grow: 1; height: 20px; background: #dfe6e9; border: 2px solid #2c3e50; border-radius: 10px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: #74b9ff; width: 0%; transition: width 0.4s ease; }

        /* 怪物血条 */
        .boss-container { background: #fff2cc; border: 2px solid #2c3e50; border-radius: 12px; padding: 10px; margin-bottom: 15px; text-align: center; }
        .hp-bar-bg { height: 25px; background: #dfe6e9; border: 2px solid #2c3e50; border-radius: 8px; overflow: hidden; margin-top: 5px; position: relative; }
        .hp-bar-fill { height: 100%; background: #ff7675; width: 100%; transition: width 0.4s ease; }
        .hp-text { position: absolute; width: 100%; text-align: center; font-weight: bold; line-height: 21px; color: #2c3e50; }

        /* 元素网格 */
        .attr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .attr-item { background: #f1f2f6; border: 2px solid #2c3e50; border-radius: 10px; padding: 8px; text-align: center; font-size: 0.9rem; font-weight: bold; }

        /* 🎒 背包神装面板 */
        .inventory-box {
            background: #dff9fb;
            border: 2px solid #2c3e50;
            border-radius: 12px;
            padding: 10px;
            margin-top: 15px;
        }
        .inventory-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 8px; text-align: left; }
        .inventory-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .item-tag { background: white; border: 2px solid #2c3e50; padding: 3px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }

        /* 任务标签 */
        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-button { flex: 1; padding: 10px; border: 3px solid #2c3e50; border-radius: 12px; background: #fff; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #2c3e50; transition: all 0.1s; }
        .tab-button.active { background: #fdcb6e; transform: translateY(4px); box-shadow: none; }

        /* 任务输入区 */
        .input-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .input-row { display: flex; gap: 10px; }
        input[type="text"], input[type="number"] { padding: 12px; border: 3px solid #2c3e50; border-radius: 12px; font-size: 1rem; }
        input[type="text"] { flex-grow: 1; }
        
        .type-select-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .type-btn { padding: 6px 12px; border: 2px solid #2c3e50; border-radius: 8px; background: white; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .type-btn.selected { background: #a29bfe; color: white; }

        .add-btn { padding: 12px 20px; background: #00b894; color: white; border: 3px solid #2c3e50; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #2c3e50; }
        .add-btn:active { transform: translateY(4px); box-shadow: none; }

        /* 任务列表 */
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item { background: white; border: 3px solid #2c3e50; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 0 #2c3e50; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .task-left { display: flex; align-items: center; gap: 12px; }
        .task-checkbox { width: 24px; height: 24px; border: 3px solid #2c3e50; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; background: white; }
        .task-text { font-size: 1.05rem; font-weight: bold; }
        .task-tag { font-size: 0.8rem; padding: 2px 6px; border: 1px solid #2c3e50; border-radius: 4px; margin-left: 5px; background: #dfe6e9; }

        /* ⏱️ 高压训练面板 */
        .timer-card { background: #fab1a0; border: var(--border-style); border-radius: var(--border-radius); box-shadow: var(--primary-shadow); padding: 20px; margin-top: 20px; text-align: center; }
        .timer-display { font-size: 2.5rem; font-weight: bold; margin: 10px 0; font-family: monospace; }
        .timer-inputs { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 12px; }
        .timer-btn { padding: 8px 16px; background: #d63031; color: white; border: 2px solid #2c3e50; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 全屏弹窗 */
        .celebrate-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 999; }
        .celebrate-box { background: white; border: var(--border-style); border-radius: var(--border-radius); padding: 40px; text-align: center; box-shadow: 0 12px 0 #636e72; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-width: 80%; }
        .celebrate-box h1 { color: #e17055; font-size: 2.5rem; margin-top: 0; }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes bounce { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="countdown-banner">
            <div class="countdown-title">
                距离 🎯 <span id="display-target-name">未命名试炼</span> 还有 <span id="countdown-days" class="countdown-days">--</span> 天
            </div>
            <div class="edit-zone">
                <input type="text" id="input-target-name" placeholder="试炼名（如:开学/国考）" style="width:130px;">
                <input type="date" id="input-target-date">
                <button class="type-btn" style="padding:4px 10px;" onclick="saveCustomTarget()">刻入契约</button>
            </div>
        </div>

        <div class="hud-card">
            <div class="hud-header">
                <span id="hud-date">⏳ 加载时间...</span>
                <span class="combo-badge" id="hud-combo">0 COMBO 🔥</span>
            </div>
            
            <div class="lvl-container">
                <div class="lvl-badge" id="player-level">LV.1</div>
                <div class="xp-bar-bg">
                    <div class="xp-bar-fill" id="player-xp-fill"></div>
                </div>
            </div>

            <div class="boss-container">
                <div style="font-weight: bold; font-size: 0.95rem;">👹 当期怠惰巨兽残存血量</div>
                <div class="hp-bar-bg">
                    <div class="hp-bar-fill" id="boss-hp-fill"></div>
                    <div class="hp-text" id="boss-hp-text">0 / 0 HP</div>
                </div>
            </div>

            <div class="attr-grid">
                <div class="attr-item">🍀 常识: <span id="attr-cs">0</span></div>
                <div class="attr-item">🔮 判断: <span id="attr-pd">0</span></div>
                <div class="attr-item">⚡ 数量: <span id="attr-sl">0</span></div>
                <div class="attr-item">📜 言语: <span id="attr-yy">0</span></div>
                <div class="attr-item">💎 资料: <span id="attr-zl">0</span></div>
            </div>

            <div class="inventory-box">
                <div class="inventory-title">🎒 随机刷题爆出的传说神装图鉴：</div>
                <div class="inventory-grid" id="inventory-items-view">
                    <span style="font-size:0.8rem; color:#7f8c8d;">暂无神装，快去刷题爆装！</span>
                </div>
            </div>
        </div>

        <div class="tab-menu">
            <button class="tab-button active" onclick="switchTab('daily')">每日副本</button>
            <button class="tab-button" onclick="switchTab('weekly')">每周挑战</button>
            <button class="tab-button" onclick="switchTab('monthly')">月度战役</button>
        </div>

        <div class="input-area" id="input-area-box">
            <div class="input-row">
                <input type="text" id="task-input" placeholder="召唤新的自律任务...">
                <button class="add-btn" onclick="addTask()">部署任务</button>
            </div>
            <div class="type-select-row">
                <button class="type-btn selected" onclick="selectType(this, '常规')">🛡️ 常规</button>
                <button class="type-btn" onclick="selectType(this, '常识')">🍀 常识</button>
                <button class="type-btn" onclick="selectType(this, '判断')">🔮 判断</button>
                <button class="type-btn" onclick="selectType(this, '数量')">⚡ 数量</button>
                <button class="type-btn" onclick="selectType(this, '言语')">📜 言语</button>
                <button class="type-btn" onclick="selectType(this, '资料')">💎 资料</button>
            </div>
        </div>

        <ul class="task-list" id="task-list-view"></ul>

        <div class="timer-card">
            <div style="font-weight: bold; font-size: 1.1rem; margin-bottom: 5px;">⏳ 模块全真高压训练</div>
            <div class="timer-inputs" id="timer-inputs-area">
                <input type="number" id="custom-minutes" value="30" min="1" max="999" style="width: 80px; text-align: center;"> 分钟
                <button class="timer-btn" style="background:#00b894;" onclick="startCustomTimer()">开启训练</button>
            </div>
            <div class="timer-display" id="timer-clock">00:00</div>
            <button class="timer-btn" id="timer-control-btn" onclick="stopTimer()" style="display:none;">强行中止</button>
        </div>

    </div>

    <div class="celebrate-overlay" id="celebrate-modal">
        <div class="celebrate-box">
            <h1 id="celebrate-title">VICTORY!</h1>
            <p id="celebrate-desc">当前阶段的怠惰怪兽已被你彻底斩杀！经验暴涨！</p>
            <button class="add-btn" onclick="closeCelebrate()">收兵回营</button>
        </div>
    </div>

    <script>
        // 神装武器池数据
        const LOOT_POOL = ["🖋️ 文曲星的断墨钢笔", "👟 行测速度之靴", "🧽 超级申论橡皮擦", "👓 考场结构化透视镜", "👑 面试满分紫金冠", "📜 上岸录取通知书签名版"];

        const defaultState = {
            level: 1,
            xp: 0,
            attrs: { cs: 0, pd: 0, sl: 0, yy: 0, zl: 0 },
            inventory: [], // 新增背包存储
            combo: 0,      // 连击计数
            targetName: "考公决战", // 默认倒计时事件名
            targetDate: "2026-11-28", // 默认倒计时日期
            daily: [],
            weekly: [],
            monthly: [],
            lastDailyRefresh: ""
        };

        let gameState = {};
        let currentTab = 'daily';
        let selectedType = '常规';
        let timerInterval = null;

        // 🛡️ 数据安全热更新保安
        function loadAndMigrateData() {
            const parsed = JSON.parse(localStorage.getItem('epic_todo_rpg_state'));
            if (!parsed) {
                gameState = { ...defaultState };
            } else {
                gameState = { ...defaultState, ...parsed };
                if (!gameState.attrs) gameState.attrs = { ...defaultState.attrs };
                if (!gameState.inventory) gameState.inventory = [];
            }
            checkDailyRefresh();
            saveData();
        }

        function saveData() {
            localStorage.setItem('epic_todo_rpg_state', JSON.stringify(gameState));
        }

        // 🍀 跨天自动重置并强制刷新核心副本
        function checkDailyRefresh() {
            const todayStr = new Date().toLocaleDateString();
            if (gameState.lastDailyRefresh !== todayStr) {
                gameState.daily = [
                    { id: 'd-zl', text: '资料分析一章 💎', type: '资料', done: false },
                    { id: 'd-yy', text: '言语理解一章 📜', type: '言语', done: false },
                    { id: 'd-pd', text: '判断推理一章 🔮', type: '判断', done: false }
                ];
                gameState.lastDailyRefresh = todayStr;
                gameState.combo = 0; // 跨天连击重置
            }
        }
// 🎯 修复加固版：刻入并保存自定义的倒计时目标
function saveCustomTarget() {
    const nameInput = document.getElementById('input-target-name').value.trim();
    const dateInput = document.getElementById('input-target-date').value;
    
    if(!dateInput) { 
        alert("🧙‍♂️ 契约阵法提示：请选择一个有效的试炼日期！"); 
        return; 
    }
    
    // 如果不输入名字，则赋予默认名
    gameState.targetName = nameInput ? nameInput : "未命名试炼";
    gameState.targetDate = dateInput;
    
    // 强制锁死数据到本地账本
    saveData();
    
    // 强制即时刷新大本营HUD界面
    updateSystemHUD();
    
    alert(`⚡ 契约结界生成！【${gameState.targetName}】已刻入大本营！`);
}

        function renderUI() {
            document.getElementById('player-level').innerText = `LV.${gameState.level}`;
            document.getElementById('player-xp-fill').style.width = `${gameState.xp}%`;

            // 属性渲染
            document.getElementById('attr-cs').innerText = gameState.attrs.cs || 0;
            document.getElementById('attr-pd').innerText = gameState.attrs.pd || 0;
            document.getElementById('attr-sl').innerText = gameState.attrs.sl || 0;
            document.getElementById('attr-yy').innerText = gameState.attrs.yy || 0;
            document.getElementById('attr-zl').innerText = gameState.attrs.zl || 0;

            // 连击HUD展示
            const comboBadge = document.getElementById('hud-combo');
            if (gameState.combo > 0) {
                comboBadge.innerText = `${gameState.combo} COMBO 🔥`;
                comboBadge.style.display = 'inline-block';
            } else {
                comboBadge.style.display = 'none';
            }

            // 渲染背包神装
            const invView = document.getElementById('inventory-items-view');
            invView.innerHTML = '';
            if(gameState.inventory.length === 0) {
                invView.innerHTML = `<span style="font-size:0.8rem; color:#7f8c8d;">暂无神装，快去刷题爆装！</span>`;
            } else {
                // 去重计数显示
                const counts = {};
                gameState.inventory.forEach(x => counts[x] = (counts[x] || 0) + 1);
                for(let item in counts) {
                    const span = document.createElement('span');
                    span.className = 'item-tag';
                    span.innerText = `${item} x${counts[item]}`;
                    invView.appendChild(span);
                }
            }

            // 任务列表与Boss血量折算
            const listContainer = document.getElementById('task-list-view');
            listContainer.innerHTML = '';
            const activeList = gameState[currentTab] || [];
            const uncompletedCount = activeList.filter(t => !t.done).length;
            const totalCount = activeList.length;

            let maxHp = totalCount * 100;
            let currentHp = uncompletedCount * 100;
            if(maxHp === 0) { maxHp = 100; currentHp = 0; }
            const hpPercent = (currentHp / maxHp) * 100;
            document.getElementById('boss-hp-fill').style.width = `${hpPercent}%`;
            document.getElementById('boss-hp-text').innerText = `${currentHp} / ${maxHp} HP`;

            activeList.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';
                if(task.done) li.style.opacity = '0.5';

                let tagIcon = '🛡️';
                if(task.type === '常识') tagIcon = '🍀';
                if(task.type === '判断') tagIcon = '🔮';
                if(task.type === '数量') tagIcon = '⚡';
                if(task.type === '言语') tagIcon = '📜';
                if(task.type === '资料') tagIcon = '💎';

                li.innerHTML = `
                    <div class="task-left">
                        <div class="task-checkbox" onclick="completeTask('${task.id}')">${task.done ? '✓' : ''}</div>
                        <span class="task-text">${task.text} <span class="task-tag">${tagIcon} ${task.type}</span></span>
                    </div>
                `;
                listContainer.appendChild(li);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderUI();
        }

        function selectType(btn, type) {
            selectedType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function addTask() {
            const input = document.getElementById('task-input');
            if(!input.value.trim()) return;

            const newTask = {
                id: 't-' + Date.now(),
                text: input.value.trim(),
                type: selectedType,
                done: false
            };

            gameState[currentTab].push(newTask);
            input.value = '';
            saveData();
            renderUI();
        }

        // 斩杀任务与成瘾机制结算
        function completeTask(id) {
            const activeList = gameState[currentTab];
            const taskIndex = activeList.findIndex(t => t.id === id);
            if(taskIndex === -1 || activeList[taskIndex].done) return;

            const task = activeList[taskIndex];
            task.done = true;

            // 属性递增
            if(task.type === '常识') gameState.attrs.cs = (gameState.attrs.cs || 0) + 1;
            if(task.type === '判断') gameState.attrs.pd = (gameState.attrs.pd || 0) + 1;
            if(task.type === '数量') gameState.attrs.sl = (gameState.attrs.sl || 0) + 1;
            if(task.type === '言语') gameState.attrs.yy = (gameState.attrs.yy || 0) + 1;
            if(task.type === '资料') gameState.attrs.zl = (gameState.attrs.zl || 0) + 1;

            // 连击Combo增益叠加
            gameState.combo += 1;
            let xpGained = 30 + (gameState.combo * 5); // 连击越高经验越多

            // 🎒 随机爆装备概率计算 (30% 概率)
            let lootMessage = "";
            if (Math.random() < 0.3) {
                const randomItem = LOOT_POOL[Math.floor(Math.random() * LOOT_POOL.length)];
                gameState.inventory.push(randomItem);
                lootMessage = `\n\n🎁 极其罕见！你在刷题中无意间爆出了传说神装：【${randomItem}】！已收入战备背包！`;
            }

            // 升级判断
            gameState.xp += xpGained; 
            if(gameState.xp >= 100) {
                gameState.level += 1;
                gameState.xp = Math.max(0, gameState.xp - 100);
                setTimeout(() => { alert(`🎉 突破天际！你成功触发连击暴击，等级晋升至 LV.${gameState.level}！${lootMessage}`); }, 300);
            } else if (lootMessage !== "") {
                setTimeout(() => { alert(`🔥 ${gameState.combo}连击达成！获得经验值 ${xpGained} 点！${lootMessage}`); }, 300);
            }

            saveData();
            renderUI();

            const incompleteCount = activeList.filter(t => !t.done).length;
            if(incompleteCount === 0) {
                setTimeout(() => { triggerCelebrate(); }, 500);
            }
        }

        function triggerCelebrate() {
            const modal = document.getElementById('celebrate-modal');
            const title = document.getElementById('celebrate-title');
            const desc = document.getElementById('celebrate-desc');

            if(currentTab === 'daily') {
                title.innerText = "⚔️ 每日副本全清！";
                desc.innerText = `今天的试炼巨兽已被你彻底碾碎！累积连击达 ${gameState.combo} 次！`;
            } else {
                title.innerText = "🏆 大型战役终结！";
                desc.innerText = "你用无懈可击的坚韧意志对怠惰实现了高维度降维打击！";
            }
            modal.style.display = 'flex';
        }

        function closeCelebrate() {
            gameState[currentTab] = gameState[currentTab].filter(t => !t.done);
            document.getElementById('celebrate-modal').style.display = 'none';
            saveData();
            renderUI();
        }

        // 自定义高压计时沙漏
        function startCustomTimer() {
            clearInterval(timerInterval);
            const minutesInput = document.getElementById('custom-minutes').value;
            let timeLeft = parseInt(minutesInput, 10) * 60;
            
            if (isNaN(timeLeft) || timeLeft <= 0) { alert("时间刻度有误，请重新调整！"); return; }

            document.getElementById('timer-inputs-area').style.display = 'none';
            document.getElementById('timer-control-btn').style.display = 'inline-block';

            function updateClock() {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timer-clock').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer-clock').innerText = "演练终了！";
                    document.getElementById('timer-inputs-area').style.display = 'flex';
                    document.getElementById('timer-control-btn').style.display = 'none';
                    alert("⚔️ 高压封印时间到！收刀！请立刻核对解析并展开高强度错题复盘！");
                }
                timeLeft--;
            }
            updateClock();
            timerInterval = setInterval(updateClock, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer-clock').innerText = "00:00";
            document.getElementById('timer-inputs-area').style.display = 'flex';
            document.getElementById('timer-control-btn').style.display = 'none';
        }

        // HUD 时空刷新
        function updateSystemHUD() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'long' };
            document.getElementById('hud-date').innerText = now.toLocaleDateString('zh-CN', options);
            
            // 自由渲染倒计时
            document.getElementById('display-target-name').innerText = gameState.targetName || "自定义试炼";
            if(gameState.targetDate) {
                const examDate = new Date(gameState.targetDate + "T00:00:00");
                const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const timeDiff = examDate - todayMidnight;
                const daysDiff = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
                document.getElementById('countdown-days').innerText = daysDiff >= 0 ? daysDiff : 0;
                
                // 自动同步输入框显示
                document.getElementById('input-target-name').value = gameState.targetName;
                document.getElementById('input-target-date').value = gameState.targetDate;
            }
        }

        // 召唤阵法运行
        loadAndMigrateData();
        renderUI();
        updateSystemHUD();
        setInterval(updateSystemHUD, 60000);
    </script>
</body>
</html>
